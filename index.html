<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Web App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 600px;
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input, button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

input[type="text"] {
    flex: 1;
    border: 1px solid #ccc;
}

input[type="datetime-local"] {
    border: 1px solid #ccc;
}

button {
    background: #6c63ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5548c8;
}

ul {
    list-style: none;
}

li {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task-left {
    display: flex;
    flex-direction: column;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.actions button {
    margin-left: 5px;
    padding: 5px 8px;
    font-size: 12px;
}

.edit {
    background: #ffa500;
}

.delete {
    background: #ff4d4d;
}

.complete {
    background: #28a745;
}

small {
    color: #555;
}

/* Responsive */
@media (max-width: 500px) {
    .input-group {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>📝 To-Do Web App</h1>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <input type="datetime-local" id="taskDate">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let taskInput = document.getElementById("taskInput");
    let taskDate = document.getElementById("taskDate");

    if (taskInput.value === "") {
        alert("Please enter a task!");
        return;
    }

    let li = document.createElement("li");

    let taskLeft = document.createElement("div");
    taskLeft.className = "task-left";

    let taskText = document.createElement("span");
    taskText.innerText = taskInput.value;

    let dateText = document.createElement("small");
    dateText.innerText = taskDate.value ? "Due: " + taskDate.value : "";

    taskLeft.appendChild(taskText);
    taskLeft.appendChild(dateText);

    let actions = document.createElement("div");
    actions.className = "actions";

    // Complete Button
    let completeBtn = document.createElement("button");
    completeBtn.innerText = "✔";
    completeBtn.className = "complete";
    completeBtn.onclick = function() {
        taskText.classList.toggle("completed");
    };

    // Edit Button
    let editBtn = document.createElement("button");
    editBtn.innerText = "✏";
    editBtn.className = "edit";
    editBtn.onclick = function() {
        let newTask = prompt("Edit task:", taskText.innerText);
        if (newTask) taskText.innerText = newTask;
    };

    // Delete Button
    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "🗑";
    deleteBtn.className = "delete";
    deleteBtn.onclick = function() {
        li.remove();
    };

    actions.appendChild(completeBtn);
    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(taskLeft);
    li.appendChild(actions);

    document.getElementById("taskList").appendChild(li);

    taskInput.value = "";
    taskDate.value = "";
}
</script>

</body>
</html>
