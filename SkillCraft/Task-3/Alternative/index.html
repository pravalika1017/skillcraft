<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body {
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    padding-top: 30px;
}

h1 {
    color: #fff;
    text-shadow: 2px 2px 5px #000;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 100px;
    height: 100px;
    background: #fff;
    font-size: 2.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.cell:hover {
    background: #ffe082;
    transform: scale(1.1);
}

.win {
    background: #81c784 !important;
}

#status {
    margin-top: 20px;
    font-size: 20px;
    color: white;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6f61;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<div class="board" id="board"></div>

<div id="status">Your Turn 😊</div>
<button onclick="restart()">Restart 🔄</button>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");
let cells = [];
let game = ["", "", "", "", "", "", "", "", ""];
let player = "❌";
let running = true;

const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

// Create board
for(let i=0; i<9; i++){
    let cell = document.createElement("div");
    cell.classList.add("cell");
    cell.addEventListener("click", () => move(i));
    board.appendChild(cell);
    cells.push(cell);
}

function move(index){
    if(game[index] !== "" || !running) return;

    playSound("clickSound");

    game[index] = player;
    cells[index].innerText = player;

    if(checkWin(player)){
        statusText.innerText = "You Win 🎉";
        playSound("winSound");
        running = false;
        return;
    }

    if(!game.includes("")){
        statusText.innerText = "Draw 😅";
        return;
    }

    statusText.innerText = "Computer Thinking 🤖";
    setTimeout(computerMove, 500);
}

function computerMove(){
    let empty = game.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    let move = empty[Math.floor(Math.random()*empty.length)];

    game[move] = "⭕";
    cells[move].innerText = "⭕";

    if(checkWin("⭕")){
        statusText.innerText = "Computer Wins 🤖";
        playSound("winSound");
        running = false;
        return;
    }

    if(!game.includes("")){
        statusText.innerText = "Draw 😅";
        return;
    }

    statusText.innerText = "Your Turn 😊";
}

function checkWin(p){
    return winPatterns.some(pattern=>{
        if(pattern.every(i=>game[i]===p)){
            pattern.forEach(i=>cells[i].classList.add("win"));
            return true;
        }
    });
}

function restart(){
    game = ["","","","","","","","",""];
    cells.forEach(c=>{
        c.innerText="";
        c.classList.remove("win");
    });
    running = true;
    statusText.innerText = "Your Turn 😊";
}

function playSound(id){
    document.getElementById(id).play();
}
</script>

</body>
</html>
