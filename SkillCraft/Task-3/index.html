<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game Pro</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #fff;
    --accent: #00f5d4;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.quiz-container {
    width: 400px;
    padding: 25px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

h2 {
    margin-bottom: 15px;
}

#timer {
    margin-bottom: 10px;
    font-size: 14px;
    opacity: 0.8;
}

.option {
    display: block;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    background: var(--accent);
    color: black;
    transform: scale(1.05);
}

.correct { background: #00c853 !important; }
.wrong { background: #d50000 !important; }

button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #2962ff;
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

#result {
    font-size: 1.5rem;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Question</h2>
    <div id="timer">Time Left: 10s</div>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
</div>

<script>
const quizData = [
    {
        question: "What does HTML stand for?",
        options: ["Hyper Trainer Marking Language", "Hyper Text Markup Language", "Hyper Text Marketing Language", "Hyper Text Markup Leveler"],
        answer: 1
    },
    {
        question: "Which language is used for styling web pages?",
        options: ["HTML", "JQuery", "CSS", "XML"],
        answer: 2
    },
    {
        question: "Which is not a JavaScript Framework?",
        options: ["React", "Angular", "Vue", "Django"],
        answer: 3
    },
    {
        question: "Which is used for web apps?",
        options: ["PHP", "Python", "JavaScript", "All"],
        answer: 3
    }
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 10;

function loadQuestion() {
    clearInterval(timer);
    timeLeft = 10;
    document.getElementById("timer").innerText = "Time Left: " + timeLeft + "s";

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Time Left: " + timeLeft + "s";
        if (timeLeft === 0) nextQuestion();
    }, 1000);

    const q = quizData[current];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        div.classList.add("option");
        div.innerText = opt;
        div.onclick = () => selectAnswer(i, div);
        optionsDiv.appendChild(div);
    });
}

function selectAnswer(i, element) {
    const correct = quizData[current].answer;
    const options = document.querySelectorAll(".option");

    options.forEach(opt => opt.style.pointerEvents = "none");

    if (i === correct) {
        element.classList.add("correct");
        score++;
    } else {
        element.classList.add("wrong");
        options[correct].classList.add("correct");
    }
}

function nextQuestion() {
    current++;
    if (current < quizData.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    clearInterval(timer);
    document.querySelector(".quiz-container").innerHTML = `
        <h2>🎉 Quiz Completed!</h2>
        <div id="result">Your Score: ${score}/${quizData.length}</div>
        <button onclick="location.reload()">Restart</button>
    `;
}

loadQuestion();
</script>

</body>
</html>
