<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Stopwatch</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #ffffff;
    --accent: #00f5d4;
}

body.light {
    --bg: #f1f5f9;
    --card: rgba(0,0,0,0.05);
    --text: #111;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s;
}

.container {
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.time {
    font-size: 2.8rem;
    margin: 20px 0;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--accent);
}

.buttons button {
    margin: 6px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.start { background: #00c853; color: white; }
.pause { background: #ffab00; }
.reset { background: #d50000; color: white; }
.lap   { background: #2962ff; color: white; }

.toggle {
    margin-top: 10px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
}

ul {
    margin-top: 15px;
    max-height: 160px;
    overflow-y: auto;
    text-align: left;
}

ul li {
    padding: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">
    <h1>⏱ Stopwatch</h1>
    <div class="time" id="display">00:00:00.000</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <div class="toggle" onclick="toggleTheme()">🌙 Toggle Theme</div>

    <ul id="laps"></ul>
</div>

<script>
let startTime = 0;
let elapsed = 0;
let timer;
let running = false;
let lastLap = 0;

function format(ms) {
    let hrs = Math.floor(ms / 3600000);
    let mins = Math.floor((ms % 3600000) / 60000);
    let secs = Math.floor((ms % 60000) / 1000);
    let milli = ms % 1000;

    return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(milli).padStart(3,'0')}`;
}

function update() {
    elapsed = Date.now() - startTime;
    document.getElementById("display").innerText = format(elapsed);
}

function start() {
    if (!running) {
        running = true;
        startTime = Date.now() - elapsed;
        timer = setInterval(update, 10);
    }
}

function pause() {
    running = false;
    clearInterval(timer);
}

function reset() {
    running = false;
    clearInterval(timer);
    elapsed = 0;
    lastLap = 0;
    document.getElementById("display").innerText = "00:00:00.000";
    document.getElementById("laps").innerHTML = "";
}

function lap() {
    if (!running) return;

    let lapTime = elapsed;
    let diff = lapTime - lastLap;
    lastLap = lapTime;

    let li = document.createElement("li");
    li.innerText = `Lap ${document.getElementById("laps").children.length + 1} ➤ ${format(lapTime)} (+${format(diff)})`;
    document.getElementById("laps").prepend(li);
}

function toggleTheme() {
    document.body.classList.toggle("light");
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
    if (e.key === " ") start();
    if (e.key === "p") pause();
    if (e.key === "r") reset();
    if (e.key === "l") lap();
});
</script>

</body>
</html>
