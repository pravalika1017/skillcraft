<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #fff;
    --accent: #00f5d4;
}

body.light {
    --bg: #f1f5f9;
    --card: rgba(0,0,0,0.05);
    --text: #111;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.calculator {
    width: 320px;
    padding: 20px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
}

.display {
    width: 100%;
    height: 70px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    font-size: 1.8rem;
    text-align: right;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    color: white;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.08);
}

.operator { background: #2962ff; color: white; }
.equal { background: #00c853; color: white; grid-column: span 2; }
.clear { background: #d50000; color: white; }
.delete { background: #ffab00; }

.toggle {
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="delete" onclick="deleteChar()">⌫</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

    <div class="toggle" onclick="toggleTheme()">🌙 Toggle Theme</div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function deleteChar() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

// Keyboard support
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
        append(e.key);
    } else if (e.key === "Enter") {
        calculate();
    } else if (e.key === "Backspace") {
        deleteChar();
    } else if (e.key === "Escape") {
        clearDisplay();
    }
});

// Theme toggle
function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
